<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rustify Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://sdk.scdn.co/spotify-player.js"></script>
</head>
<body class="bg-[#121212] text-white flex flex-col items-center justify-center min-h-screen font-sans">
    <div id="setup" class="bg-[#191414] p-10 rounded-2xl shadow-2xl border border-gray-800 text-center w-96">
        <h1 class="text-3xl font-bold mb-6 text-[#1DB954]">Rustify</h1>
        <p class="text-gray-400 mb-6 text-sm">Enter your SteamID to link and start the player.</p>
        <input type="text" id="sid" placeholder="SteamID64" class="w-full p-3 bg-gray-800 border border-gray-700 rounded-lg mb-4 text-center text-lg focus:border-[#1DB954] outline-none transition">
        <button onclick="link()" class="bg-[#1DB954] hover:bg-[#1ed760] text-black font-bold py-3 px-8 rounded-full w-full transition transform active:scale-95">Link Spotify Account</button>
    </div>

    <div id="player-ui" class="hidden bg-[#191414] p-10 rounded-2xl shadow-2xl border border-gray-800 text-center w-96">
        <div id="album-art" class="w-64 h-64 bg-gray-800 mx-auto rounded-lg mb-6 shadow-lg flex items-center justify-center">
            <span class="text-5xl text-gray-700">♫</span>
        </div>
        <h2 id="track-name" class="text-xl font-bold truncate">Loading...</h2>
        <p id="artist-name" class="text-gray-400 mb-6 truncate">Ready to sync with Rust</p>
        
        <div class="flex justify-center gap-6 mb-4">
            <button onclick="player.previousTrack()" class="text-3xl hover:text-[#1DB954]">⏮</button>
            <button id="play-pause" onclick="player.togglePlay()" class="text-5xl hover:scale-110 transition">▶</button>
            <button onclick="player.nextTrack()" class="text-3xl hover:text-[#1DB954]">⏭</button>
        </div>
        <p class="text-[10px] text-gray-500 uppercase tracking-widest">Active Rustify Session</p>
    </div>

    <script>
        const BRIDGE = "https://my-rustify-bridge.onrender.com";
        let player;
        let device_id;

        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (token) {
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('player-ui').classList.remove('hidden');
        }

        function link() {
            const id = document.getElementById('sid').value;
            if (id.length < 17) return alert("Invalid SteamID");
            window.location.href = `${BRIDGE}/auth/login?steamId=${id}`;
        }

        window.onSpotifyWebPlaybackSDKReady = () => {
            if (!token) return;

            player = new Spotify.Player({
                name: 'Rustify Web Player',
                getOAuthToken: cb => { cb(token); },
                volume: 0.5
            });

            player.addListener('ready', ({ device_id: id }) => {
                console.log('Ready with Device ID', id);
                device_id = id;
                // Auto-transfer playback to this browser
                fetch('https://api.spotify.com/v1/me/player', {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ device_ids: [id], play: true })
                });
            });

            player.addListener('player_state_changed', state => {
                if (!state) return;
                document.getElementById('track-name').innerText = state.track_window.current_track.name;
                document.getElementById('artist-name').innerText = state.track_window.current_track.artists[0].name;
                const art = state.track_window.current_track.album.images[0].url;
                document.getElementById('album-art').innerHTML = `<img src="${art}" class="rounded-lg shadow-md" />`;
                document.getElementById('play-pause').innerText = state.paused ? '▶' : '⏸';
            });

            player.connect();
        };
    </script>
</body>
</html>
